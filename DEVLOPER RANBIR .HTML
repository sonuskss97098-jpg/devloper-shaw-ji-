<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - GameZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .board {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-gap: 5px;
            justify-content: center;
            margin: 20px auto;
        }
        .cell {
            width: 120px;
            height: 120px;
            background: #1a1a2e;
            border: 2px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 10px;
        }
        .cell:hover {
            background: #020f33;
            transform: scale(1.05);
        }
        .cell.win {
            background: #525e55 !important;
            animation: pulse 0.5s ease infinite;
        }
        .cell.x-mark { color: #00d4ff; }
        .cell.o-mark { color: #ff6b6b; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .status-text {
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html"><i class="bi bi-controller"></i> GameZone</a>
            <a href="../index.html" class="btn btn-outline-light btn-sm"><i class="bi bi-house"></i> Back</a>
        </div>
    </nav>


    <div class="container mt-5 pt-5">
        <div class="text-center mb-4">
            <marquee>
            <p><b>DEVELOPER: RANBIR SHAW</b></p>
            </marquee>
            </p>
            <h1>❌ Tic Tac Toe ⭕</h1>
            <p>Get 3 in a row to win! Play against AI or a friend.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <div class="mb-3">
                    <button class="btn btn-outline-info me-2" id="vsAIBtn" onclick="setMode('ai')">🤖 vs AI</button>
                    <button class="btn btn-outline-warning" id="vsFriendBtn" onclick="setMode('friend')">👥 vs Friend</button>
                </div>

                <div class="status-text mb-3" id="status">Player X's turn</div>
                
                <div class="board" id="board">
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>

                <div class="mt-3">
                    <span class="badge bg-light text-dark fs-5 me-3">X Wins: <span id="xWins">0</span></span>
                    <span class="badge bg-light text-dark fs-5">O Wins: <span id="oWins">0</span></span>
                </div>

                <div class="mt-3">
                    <button class="btn btn-primary" onclick="resetGame()">
                        <i class="bi bi-arrow-repeat"></i> New Game
                    </button>
                    <button class="btn btn-success" id="submitTicScore" disabled onclick="submitScore()">
                        <i class="bi bi-save"></i> Save Score
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/games.js"></script>
    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let gameMode = 'ai'; // 'ai' or 'friend'
        let xWins = 0, oWins = 0;
        let round = 0;
        const winPatterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        const cells = document.querySelectorAll('.cell');
        const statusEl = document.getElementById('status');
        const xWinsEl = document.getElementById('xWins');
        const oWinsEl = document.getElementById('oWins');

        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const index = parseInt(cell.dataset.index);
                handleMove(index);
            });
        });

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('vsAIBtn').className = mode === 'ai' ? 'btn btn-info me-2' : 'btn btn-outline-info me-2';
            document.getElementById('vsFriendBtn').className = mode === 'friend' ? 'btn btn-warning' : 'btn btn-outline-warning';
            resetGame();
        }

        function handleMove(index) {
            if (!gameActive || board[index] !== '') return;
            if (gameMode === 'ai' && currentPlayer === 'O') return;

            makeMove(index, currentPlayer);
            
            if (gameActive && gameMode === 'ai' && currentPlayer === 'O') {
                setTimeout(aiMove, 500);
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            const cell = cells[index];
            cell.textContent = player;
            cell.className = `cell ${player.toLowerCase()}-mark`;

            if (checkWin(player)) {
                gameActive = false;
                highlightWin(player);
                if (player === 'X') { xWins++; xWinsEl.textContent = xWins; }
                else { oWins++; oWinsEl.textContent = oWins; }
                statusEl.textContent = `🎉 Player ${player} wins!`;
                document.getElementById('submitTicScore').disabled = false;
                return;
            }

            if (board.every(cell => cell !== '')) {
                gameActive = false;
                statusEl.textContent = "🤝 It's a draw!";
                document.getElementById('submitTicScore').disabled = false;
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusEl.textContent = `Player ${currentPlayer}'s turn`;
        }

        function aiMove() {
            if (!gameActive) return;
            
            // Try to win
            for (let pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] === 'O' && board[b] === 'O' && board[c] === '') { makeMove(c, 'O'); return; }
                if (board[a] === 'O' && board[c] === 'O' && board[b] === '') { makeMove(b, 'O'); return; }
                if (board[b] === 'O' && board[c] === 'O' && board[a] === '') { makeMove(a, 'O'); return; }
            }

            // Block player
            for (let pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] === 'X' && board[b] === 'X' && board[c] === '') { makeMove(c, 'O'); return; }
                if (board[a] === 'X' && board[c] === 'X' && board[b] === '') { makeMove(b, 'O'); return; }
                if (board[b] === 'X' && board[c] === 'X' && board[a] === '') { makeMove(a, 'O'); return; }
            }

            // Take center
            if (board[4] === '') { makeMove(4, 'O'); return; }

            // Take corners
            const corners = [0, 2, 6, 8];
            const emptyCorners = corners.filter(i => board[i] === '');
            if (emptyCorners.length > 0) {
                makeMove(emptyCorners[Math.floor(Math.random() * emptyCorners.length)], 'O');
                return;
            }

            // Take any empty
            const empty = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                makeMove(empty[Math.floor(Math.random() * empty.length)], 'O');
            }
        }

        function checkWin(player) {
            return winPatterns.some(pattern => {
                return pattern.every(index => board[index] === player);
            });
        }

        function highlightWin(player) {
            for (let pattern of winPatterns) {
                if (pattern.every(index => board[index] === player)) {
                    pattern.forEach(index => {
                        cells[index].classList.add('win');
                    });
                }
            }
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            statusEl.textContent = "Player X's turn";
            document.getElementById('submitTicScore').disabled = true;
            
            cells.forEach(cell => {
                cell.textContent = '';
                cell.className = 'cell';
            });
        }

        async function submitScore() {
            const winner = currentPlayer === 'X' ? 'O' : 'X';
            try {
                const response = await fetch('../backend/save_score.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        game_name: 'tictactoe',
                        score: xWins * 100 + oWins * 50,
                        level_reached: Math.floor((xWins + oWins) / 3) + 1
                    })
                });
                const result = await response.json();
                if (result.success) {
                    alert('✅ Score saved!');
                } else {
                    alert('Please login first.');
                    window.location.href = '../login.html';
                }
            } catch (e) {
                alert('Please login first.');
                window.location.href = '../login.html';
            }
        }

        setMode('ai');
    </script>
</body>
</html>
